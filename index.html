<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style/style.css" />
    <title>Factura — Connexion</title>
  </head>
  <body>

    <div
      class="min-h-screen bg-[#eef0f6] flex flex-col items-center justify-center font-[inter]"
    >
      <div
        class="bg-white rounded-2xl shadow-sm border border-slate-200 px-10 py-12 w-full max-w-md flex flex-col items-center"
      >
        <!-- Logo -->
        <div
          class="bg-[#5b4cff] text-white font-bold text-2xl w-12 h-12 flex items-center justify-center rounded-xl mb-4"
        >
          F
        </div>

        <form class="form-container ">
          <div class="id-input">
            <p class="text-gray-700 text-sm mb-1">
              identifiant
            </p>
            <input class="border border-gray-300 rounded-md py-1 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="id" id="id" placeholder="identifiant" required>
          </div>
          <div class="password-input">
            <p class="text-gray-700 text-sm font-inter">
              mot de passe
            </p>
            <input class="input validator border border-gray-300 rounded-md py-1 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500" type="password" name="password" id="password" placeholder="mot de passe" required>
            <div class="validator-hint">mot de passe incorrect</div>
          </div>
          <div class="remember-input flex items-center gap-2 mt-2">
            <input type="checkbox" id="rememberMe" class="checkbox checkbox-primary checkbox-sm" />
            <label for="rememberMe" class="text-gray-600 text-sm cursor-pointer">Se souvenir de moi</label>
          </div>
        </form>
        <button class="btn btn-primary min-w-full mt-5" id="submitBtn">Se connecter</button>
      </div>
    </div>

    <script type="module" src="/src/script/script.js"></script>
  </body>
</html>
