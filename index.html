<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style/style.css" />
    <title>factura</title>
  </head>
  <body>
    <div
      class="min-h-screen bg-[#eef0f6] flex flex-col items-center justify-center font-[inter]"
    >
      <div
        class="bg-white rounded-2xl shadow-sm border border-slate-200 px-10 py-12 w-full max-w-md flex flex-col items-center"
      >
        <!-- Logo -->
        <div
          class="bg-[#5b4cff] text-white font-bold text-2xl w-12 h-12 flex items-center justify-center rounded-xl mb-4"
        >
          F
        </div>
        <!-- Titre -->
        <h1 class="text-2xl font-bold text-slate-900 mb-1">Factura</h1>
        <p class="text-slate-400 text-sm mb-8">Connectez-vous à votre espace</p>

        <!-- Formulaire -->
        <form
          class="w-full flex flex-col gap-5"
          action="./src/pages/dashboard.html"
        >
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-slate-900"
              >Identifiant</label
            >
            <input
              type="text"
              placeholder="Identifiant"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-500 outline-none focus:border-[#5b4cff] transition"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-slate-900"
              >Mot de passe</label
            >
            <input
              type="password"
              placeholder="Mot de passe"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-500 outline-none focus:border-[#5b4cff] transition"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-[#5b4cff] hover:bg-[#4a3de6] text-white font-semibold py-3 rounded-lg transition cursor-pointer"
          >
            Se connecter
          </button>
        </form>
      </div>

      <!-- Identifiants de test -->
      <p class="text-slate-400 text-xs mt-6">
        Identifiants : admin / admin123 · alice / alice456
      </p>
    </div>
  </body>
</html>
