<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style/style.css" />
    <title>Factura — Connexion</title>
  </head>
  <body class="font-[inter] bg-[#f1f5f9] h-screen flex flex-col items-center justify-center">
    <div class="container flex flex-col  justify-center items-center border-1 border-gray-100 shadow-xl bg-white rounded-xl p-6 max-w-fit max-h-fit">
      <div class="header flex flex-col items-center gap-5">
        <div class="logo-container flex items-center flex-col gap-2">
          <div class="logo-container bg-[#4f46e5] rounded-2xl">
            <p class="text-white font-bold text-2xl px-6 py-3">F</p>
          </div>
          <H1 class="text-2xl font-bold ">
            Factura
          </H1>
          <div class="sub text-gray-500 mt-[-10px]">Connectez-vous à votre espace</div>
        </div>
        
        <form class="form-container ">
          <div class="id-input">
            <p class="text-gray-700 text-sm mb-1">
              identifiant
            </p>
            <input class="border border-gray-300 rounded-md py-1 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="id" id="id" placeholder="identifiant" required>
          </div>
          <div class="password-input">
            <p class="text-gray-700 text-sm font-inter">
              mot de passe
            </p>
            <input class="input validator border border-gray-300 rounded-md py-1 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500" type="password" name="password" id="password" placeholder="mot de passe" required>
            <div class="validator-hint">mot de passe incorrect</div>
          </div>
          <div class="remember-input flex items-center gap-2 mt-2">
            <input type="checkbox" id="rememberMe" class="checkbox checkbox-primary checkbox-sm" />
            <label for="rememberMe" class="text-gray-600 text-sm cursor-pointer">Se souvenir de moi</label>
          </div>
        </form>
        <button class="btn btn-primary min-w-full mt-5" id="submitBtn">Se connecter</button>
      </div>
    </div>
    <div class="ids-container">
      <p class="text-gray-400 text-xs mt-5">Identifiants: admin / admin123 alice / alice456</p>
    </div>
    </div>
    <script src="/src/script/script.js"></script>
  </body>
</html>
